
<!DOCTYPE html>

<title>AJL Métodos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#071c2c,#0c2c44);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:90%;
max-width:420px;
text-align:center;
}

.logo{
width:180px;
margin-bottom:15px;
animation:flutuar 3s ease-in-out infinite;
}

@keyframes flutuar{
0%{transform:translateY(0px)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0px)}
}

h1{
color:#d4a23a;
font-size:28px;
margin-bottom:5px;
}

.sub{
font-size:14px;
color:#cfcfcf;
margin-bottom:30px;
}

.link{
display:block;
padding:16px;
margin:12px 0;
border-radius:15px;
background:linear-gradient(90deg,#d4a23a,#b8862e);
color:#071c2c;
text-decoration:none;
font-weight:600;
font-size:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
transition:0.25s;
position:relative;
overflow:hidden;
}

.link:hover{
transform:scale(1.05);
}

.link:before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transition:0.6s;
}

.link:hover:before{
left:100%;
}

.social{
margin-top:25px;
}

.social a{
margin:0 10px;
font-size:22px;
color:#d4a23a;
text-decoration:none;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
}

.footer{
margin-top:25px;
font-size:12px;
opacity:0.6;
}
</style>

<script src="https://kit.fontawesome.com/4ad53f4c8a.js" crossorigin="anonymous"></script>

</head>

<body>
